services:
  redis:
    image: redis:alpine
    command: redis-server --notify-keyspace-events Ex
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_DB_PATH=/data/log.db
      - AWS_DEFAULT_REGION
      - S3_BUCKET_NAME
    volumes:
      - backend-data:/data
    depends_on:
      - redis

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A async_task worker --loglevel=info
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_DB_PATH=/data/log.db
      - AWS_DEFAULT_REGION
      - S3_BUCKET_NAME
    volumes:
      - backend-data:/data
    depends_on:
      - redis

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A async_task beat --loglevel=info
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_DB_PATH=/data/log.db
      - AWS_DEFAULT_REGION
      - S3_BUCKET_NAME
      - FILE_TTL_SECONDS=86400
    volumes:
      - backend-data:/data
    depends_on:
      - redis

volumes:
  backend-data: